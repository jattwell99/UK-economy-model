# Fly.io config. Rename `app` to your chosen name before `fly launch --no-deploy`.
# Set secrets and attach Postgres before deploying (see docs/DEPLOY.md):
#   fly secrets set DJANGO_SECRET_KEY=$(python -c "import secrets;print(secrets.token_urlsafe(50))")
#   fly postgres create   &&   fly postgres attach <db-app>   # injects DATABASE_URL
# ALLOWED_HOSTS is handled automatically: settings.py appends "<app>.fly.dev"
# from the FLY_APP_NAME Fly sets at runtime.

app = "uk-economy-model"
primary_region = "lhr"

[build]

[env]
  DJANGO_DEBUG = "0"
  PORT = "8000"

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0

[[vm]]
  size = "shared-cpu-1x"
  memory = "512mb"
