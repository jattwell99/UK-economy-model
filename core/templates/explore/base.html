{% load static %}
<!doctype html>
<html lang="en-gb">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}Explore UK places{% endblock %}</title>
  <style>
    :root { --ink:#1a1a1a; --muted:#666; --line:#e2e2e2; --bg:#fafafa; --accent:#374151; }
    * { box-sizing: border-box; }
    body {
      font: 15px/1.5 -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      color: var(--ink); background: var(--bg); margin: 0; padding: 0;
    }
    .wrap { max-width: 1100px; margin: 0 auto; padding: 24px 20px 64px; }
    a { color: var(--accent); }
    header.site { border-bottom: 1px solid var(--line); background: #fff; }
    header.site .wrap { padding: 16px 20px; display: flex; align-items: baseline; gap: 16px; }
    header.site h1 { font-size: 17px; margin: 0; font-weight: 600; }
    header.site .tag { color: var(--muted); font-size: 13px; }
    h2 { font-size: 22px; margin: 0 0 4px; }
    .crumb { color: var(--muted); font-size: 13px; margin-bottom: 20px; }
    .meta { color: var(--muted); font-size: 14px; margin: 0 0 24px; }
    .meta dl { display: grid; grid-template-columns: max-content 1fr; gap: 2px 14px; margin: 8px 0 0; }
    .meta dt { color: var(--muted); }
    .meta dd { margin: 0; color: var(--ink); }
    form.search { margin: 0 0 20px; }
    form.search input[type=search] {
      width: 100%; max-width: 420px; padding: 9px 12px; font-size: 15px;
      border: 1px solid var(--line); border-radius: 6px;
    }
    ul.places { list-style: none; padding: 0; margin: 0;
      display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 8px 20px; }
    ul.places li { padding: 6px 0; border-bottom: 1px solid var(--line); }
    ul.places .code { color: var(--muted); font-size: 12px; font-variant-numeric: tabular-nums; }
    ul.places .tier { color: var(--muted); font-size: 10.5px; text-transform: uppercase; letter-spacing: .04em;
      border: 1px solid var(--line); border-radius: 999px; padding: 1px 6px; margin-left: 8px; }
    ul.places .era { color: var(--muted); font-size: 11px; font-variant-numeric: tabular-nums; margin-left: 6px; }
    .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 20px; }
    .card { background: #fff; border: 1px solid var(--line); border-radius: 8px; padding: 16px; }
    .card h3 { font-size: 15px; margin: 0 0 2px; }
    .card .unit { color: var(--muted); font-size: 12px; margin: 0 0 10px; }
    .card .prov { color: var(--muted); font-size: 11.5px; margin: 10px 0 0; border-top: 1px dashed var(--line); padding-top: 8px; }
    .card .unit .cov { color: var(--muted); }
    .coverage { margin: 28px 0 0; padding: 14px 16px; background: #fff; border: 1px solid var(--line); border-radius: 8px; }
    .coverage h3 { font-size: 13px; margin: 0 0 6px; color: var(--muted); font-weight: 600; }
    .coverage ul { margin: 0; padding-left: 18px; }
    .coverage li { font-size: 13px; margin: 2px 0; }
    .coverage .why { color: var(--muted); }
    .empty { color: var(--muted); }
  </style>
  {% block extra_head %}{% endblock %}
</head>
<body>
  <header class="site">
    <div class="wrap">
      <h1><a href="{% url 'explore:place_list' %}" style="text-decoration:none;color:inherit">UK place explorer</a></h1>
      <span class="tag">Explore the data — economic activity and outcomes by place</span>
    </div>
  </header>
  <main class="wrap">
    {% block content %}{% endblock %}
  </main>
  {% block scripts %}{% endblock %}
</body>
</html>
